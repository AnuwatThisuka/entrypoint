name: release

# Tag a version to cut a release:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog is complete

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Default token publishes the GitHub Release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A PAT with write access to AnuwatThisuka/homebrew-tap so the
          # Homebrew formula can be pushed. Add it as a repo secret; if unset,
          # remove the `brews:` block from .goreleaser.yaml.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
